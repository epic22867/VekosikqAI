<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vekosiq AI</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #0f1117;
    color: #e8e8e8;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 16px 20px;
    background: #161925;
    border-bottom: 1px solid #262a3a;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 { margin: 0; font-size: 18px; color: #7c9bff; }
  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .msg { max-width: 75%; padding: 10px 14px; border-radius: 10px; line-height: 1.4; white-space: pre-wrap; }
  .user { align-self: flex-end; background: #2b6cb0; color: white; }
  .bot { align-self: flex-start; background: #1e2230; border: 1px solid #2c3147; }
  footer {
    padding: 14px 20px;
    background: #161925;
    border-top: 1px solid #262a3a;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  input[type=text] {
    flex: 1;
    padding: 12px 14px;
    border-radius: 8px;
    border: 1px solid #2c3147;
    background: #0f1117;
    color: white;
    font-size: 14px;
  }
  button {
    padding: 12px 16px;
    border: none;
    border-radius: 8px;
    background: #7c9bff;
    color: #0f1117;
    font-weight: 600;
    cursor: pointer;
  }
  button:hover { opacity: 0.9; }
  label.upload {
    padding: 12px 14px;
    border-radius: 8px;
    background: #2c3147;
    cursor: pointer;
    font-size: 13px;
  }
  #imgPreview { max-height: 36px; border-radius: 6px; display: none; }
  .toggle { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #aaa; }
</style>
</head>
<body>

<header>
  <h1>Vekosiq AI</h1>
  <div class="toggle">
    <input type="checkbox" id="searchToggle" />
    <label for="searchToggle">Web search (Tavily)</label>
  </div>
</header>

<div id="chat"></div>

<footer>
  <label class="upload">
    📷
    <input type="file" id="imageInput" accept="image/*" style="display:none" />
  </label>
  <img id="imgPreview" />
  <input type="text" id="textInput" placeholder="Ask Vekosiq AI..." />
  <button id="sendBtn">Send</button>
</footer>

<script>
  const chat = document.getElementById('chat');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const imageInput = document.getElementById('imageInput');
  const imgPreview = document.getElementById('imgPreview');
  const searchToggle = document.getElementById('searchToggle');

  let pendingImage = null;

  imageInput.addEventListener('change', () => {
    const file = imageInput.files[0];
    if (!file) return;
    pendingImage = file;
    imgPreview.src = URL.createObjectURL(file);
    imgPreview.style.display = 'inline-block';
  });

  function addMessage(text, who) {
    const div = document.createElement('div');
    div.className = 'msg ' + who;
    div.textContent = text;
    chat.appendChild(div);
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  async function send() {
    const text = textInput.value.trim();
    if (!text && !pendingImage) return;

    if (pendingImage) {
      addMessage(text || '(image uploaded)', 'user');
      const fd = new FormData();
      fd.append('image', pendingImage);
      fd.append('prompt', text || 'Describe this image in detail.');
      textInput.value = '';
      const loading = addMessage('Analyzing image...', 'bot');
      pendingImage = null;
      imgPreview.style.display = 'none';
      try {
        const res = await fetch('/api/vision', { method: 'POST', body: fd });
        const data = await res.json();
        loading.textContent = data.reply || data.error || 'No response';
      } catch (e) {
        loading.textContent = 'Error: ' + e.message;
      }
      return;
    }

    addMessage(text, 'user');
    textInput.value = '';
    const loading = addMessage('Thinking...', 'bot');

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, useSearch: searchToggle.checked })
      });
      const data = await res.json();
      loading.textContent = data.reply || data.error || 'No response';
    } catch (e) {
      loading.textContent = 'Error: ' + e.message;
    }
  }

  sendBtn.addEventListener('click', send);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') send();
  });

  addMessage('Hi, I am Vekosiq AI. Ask me anything, attach an image, or toggle web search.', 'bot');
</script>

</body>
</html>
