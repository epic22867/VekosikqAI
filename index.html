<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vekosiq AI</title>
<style>
  :root {
    --bg: #fafaf8;
    --panel: #ffffff;
    --border: #e5e9e3;
    --green: #6fae8c;
    --green-soft: #e7f3ec;
    --green-dark: #4f8f6d;
    --text: #2b2f2c;
    --text-soft: #8a948c;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ---------- Sidebar ---------- */
  #sidebar {
    width: 240px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  #sidebar-header {
    padding: 18px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green);
  }
  #sidebar-header h1 {
    font-size: 15px;
    margin: 0;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  #newChatBtn {
    margin: 14px;
    padding: 10px 12px;
    border: 1px solid var(--green);
    background: var(--green-soft);
    color: var(--green-dark);
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
  }
  #newChatBtn:hover { background: var(--green); color: white; }
  #historyList {
    flex: 1;
    overflow-y: auto;
    padding: 0 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .hist-item {
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13px;
    color: var(--text-soft);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hist-item:hover { background: var(--green-soft); color: var(--text); }
  .hist-item.active { background: var(--green-soft); color: var(--green-dark); font-weight: 600; }
  #sidebar-footer {
    padding: 12px 16px;
    font-size: 11px;
    color: var(--text-soft);
    border-top: 1px solid var(--border);
  }

  /* ---------- Main ---------- */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  header {
    padding: 16px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header .title { font-size: 14px; font-weight: 600; color: var(--text-soft); }
  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-soft);
    cursor: pointer;
    user-select: none;
  }
  .switch {
    width: 36px; height: 20px;
    background: var(--border);
    border-radius: 20px;
    position: relative;
    transition: background 0.2s;
  }
  .switch.on { background: var(--green); }
  .switch::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: white;
    border-radius: 50%;
    transition: left 0.2s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  .switch.on::after { left: 18px; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 760px;
    margin: 0 auto;
    width: 100%;
  }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .row.bot { justify-content: flex-start; }
  .msg {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.5;
    white-space: pre-wrap;
    font-size: 14.5px;
  }
  .row.user .msg {
    background: var(--green);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .row.bot .msg {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .sources {
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--text-soft);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .sources a {
    color: var(--green-dark);
    text-decoration: none;
    background: var(--green-soft);
    padding: 3px 8px;
    border-radius: 8px;
  }
  .sources a:hover { text-decoration: underline; }

  #welcome {
    margin: auto;
    text-align: center;
    color: var(--text-soft);
  }
  #welcome .logo {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: var(--green-soft);
    color: var(--green-dark);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    font-size: 22px;
    font-weight: 700;
  }
  #welcome h2 { color: var(--text); font-size: 18px; margin: 0 0 6px; }
  #welcome p { font-size: 13.5px; margin: 0; }

  footer {
    padding: 18px 24px 24px;
    background: var(--bg);
  }
  #inputBar {
    max-width: 760px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 8px 8px 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 10px rgba(80, 110, 90, 0.06);
  }
  #inputBar:focus-within { border-color: var(--green); }
  input[type=text] {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 14.5px;
    color: var(--text);
    padding: 8px 0;
  }
  input[type=text]::placeholder { color: var(--text-soft); }
  #charCount {
    font-size: 11px;
    color: var(--text-soft);
    flex-shrink: 0;
    padding-right: 2px;
    user-select: none;
  }
  #charCount.limit { color: #c0594f; font-weight: 600; }
  button#sendBtn {
    width: 38px; height: 38px;
    border: none;
    border-radius: 12px;
    background: var(--green);
    color: white;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  button#sendBtn:hover { background: var(--green-dark); }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  /* ---------- Mobile menu button (hidden on desktop) ---------- */
  #menuBtn {
    display: none;
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    background: var(--panel);
    border-radius: 10px;
    color: var(--text);
    font-size: 16px;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
  }
  #sidebarOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 20;
  }

  /* ---------- Mobile breakpoint ---------- */
  @media (max-width: 768px) {
    body { height: 100dvh; }

    #menuBtn { display: flex; }

    #sidebar {
      position: fixed;
      top: 0; bottom: 0; left: 0;
      width: 78%;
      max-width: 300px;
      z-index: 30;
      transform: translateX(-100%);
      transition: transform 0.25s ease;
      box-shadow: 2px 0 16px rgba(0,0,0,0.12);
    }
    #sidebar.open { transform: translateX(0); }

    #sidebarOverlay.open { display: block; }

    header {
      padding: 12px 14px;
      gap: 10px;
    }
    header .title {
      font-size: 13px;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .toggle span { display: none; }
    .toggle { gap: 0; }

    #chat {
      padding: 16px 12px 12px;
      gap: 12px;
    }
    .msg {
      max-width: 88%;
      font-size: 15px;
      padding: 10px 13px;
    }
    #welcome .logo { width: 42px; height: 42px; font-size: 19px; }
    #welcome h2 { font-size: 16px; }
    #welcome p { font-size: 13px; padding: 0 20px; }

    footer {
      padding: 10px 10px calc(14px + env(safe-area-inset-bottom));
    }
    #inputBar {
      padding: 6px 6px 6px 12px;
      border-radius: 16px;
    }
    /* font-size 16px on inputs prevents iOS auto-zoom on focus */
    input[type=text] {
      font-size: 16px;
      padding: 9px 0;
    }
    #charCount { display: none; }
    button#sendBtn {
      width: 36px; height: 36px;
    }
  }

  @media (max-width: 420px) {
    .msg { max-width: 92%; font-size: 14.5px; }
    header { padding: 10px 12px; }
  }
</style>
</head>
<body>

<div id="sidebarOverlay"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <div class="dot"></div>
    <h1>Vekosiq AI</h1>
  </div>
  <button id="newChatBtn">+ New chat</button>
  <div id="historyList"></div>
  <div id="sidebar-footer">Qwen3:8b · Qwen2.5VL:3b</div>
</div>

<div id="main">
  <header>
    <div id="menuBtn">☰</div>
    <div class="title" id="chatTitle">New chat</div>
    <div class="toggle" id="searchToggleWrap">
      <span>Web search</span>
      <div class="switch" id="searchSwitch"></div>
    </div>
  </header>

  <div id="chat">
    <div id="welcome">
      <div class="logo">V</div>
      <h2>Vekosiq AI</h2>
      <p>Ask a question, or turn on web search.</p>
    </div>
  </div>

  <footer>
    <div id="inputBar">
      <input type="text" id="textInput" placeholder="Message Vekosiq AI..." maxlength="1096" />
      <span id="charCount">0 / 1096</span>
      <button id="sendBtn">↑</button>
    </div>
  </footer>
</div>

<script>
  const chatEl = document.getElementById('chat');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const charCount = document.getElementById('charCount');
  const searchSwitch = document.getElementById('searchSwitch');
  const searchToggleWrap = document.getElementById('searchToggleWrap');
  const newChatBtn = document.getElementById('newChatBtn');
  const historyListEl = document.getElementById('historyList');
  const chatTitle = document.getElementById('chatTitle');
  const menuBtn = document.getElementById('menuBtn');
  const sidebarEl = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebarOverlay');

  function openSidebar() {
    sidebarEl.classList.add('open');
    sidebarOverlay.classList.add('open');
  }
  function closeSidebar() {
    sidebarEl.classList.remove('open');
    sidebarOverlay.classList.remove('open');
  }
  menuBtn.addEventListener('click', () => {
    sidebarEl.classList.contains('open') ? closeSidebar() : openSidebar();
  });
  sidebarOverlay.addEventListener('click', closeSidebar);

  const MAX_LEN = 1096; // keep in sync with server's MAX_MESSAGE_LENGTH

  let searchOn = false;
  let isBusy = false; // true while a request is in flight, blocks sending more

  // ---------- Conversation store (in-memory, resets on page reload) ----------
  // conversations: { id: { title, messages: [{role, content}], rendered: [{text, who, sources}] } }
  let conversations = {};
  let activeId = null;

  function newId() { return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7); }

  function createConversation() {
    const id = newId();
    conversations[id] = { title: 'New chat', messages: [], rendered: [] };
    activeId = id;
    renderHistoryList();
    renderActiveChat();
  }

  function renderHistoryList() {
    historyListEl.innerHTML = '';
    Object.entries(conversations)
      .sort((a, b) => b[0].localeCompare(a[0]))
      .forEach(([id, conv]) => {
        const div = document.createElement('div');
        div.className = 'hist-item' + (id === activeId ? ' active' : '');
        div.textContent = conv.title;
        div.onclick = () => { activeId = id; renderHistoryList(); renderActiveChat(); closeSidebar(); };
        historyListEl.appendChild(div);
      });
  }

  function renderActiveChat() {
    const conv = conversations[activeId];
    chatTitle.textContent = conv.title;
    chatEl.innerHTML = '';
    if (conv.rendered.length === 0) {
      chatEl.innerHTML = `
        <div id="welcome">
          <div class="logo">V</div>
          <h2>Vekosiq AI</h2>
          <p>Ask a question, or turn on web search.</p>
        </div>`;
      return;
    }
    conv.rendered.forEach(item => appendMessageEl(item.text, item.who, item.sources, false));
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function appendMessageEl(text, who, sources, save = true) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const row = document.createElement('div');
    row.className = 'row ' + who;
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = text;
    row.appendChild(msg);

    if (sources && sources.length) {
      const srcDiv = document.createElement('div');
      srcDiv.className = 'sources';
      sources.forEach(s => {
        const a = document.createElement('a');
        a.href = s.url; a.target = '_blank'; a.textContent = s.title?.slice(0, 28) || 'source';
        srcDiv.appendChild(a);
      });
      msg.appendChild(srcDiv);
    }

    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;

    if (save) {
      conversations[activeId].rendered.push({ text, who, sources });
    }
    return msg;
  }

  function updateCharCount() {
    const len = textInput.value.length;
    charCount.textContent = `${len} / ${MAX_LEN}`;
    charCount.classList.toggle('limit', len >= MAX_LEN);
  }
  textInput.addEventListener('input', updateCharCount);
  updateCharCount();

  searchToggleWrap.addEventListener('click', () => {
    searchOn = !searchOn;
    searchSwitch.classList.toggle('on', searchOn);
  });

  newChatBtn.addEventListener('click', () => { createConversation(); closeSidebar(); });

  async function send() {
    if (isBusy) return; // one request at a time — don't pile requests onto the server

    const text = textInput.value.trim();
    if (!text) return;
    if (text.length > MAX_LEN) {
      appendMessageEl(`Message is too long (${text.length}/${MAX_LEN} characters). Please shorten it.`, 'bot', null, false);
      return;
    }
    if (!activeId) createConversation();
    const conv = conversations[activeId];

    isBusy = true;
    sendBtn.disabled = true;
    sendBtn.style.opacity = '0.5';

    try {

    if (conv.title === 'New chat' && text) {
      conv.title = text.slice(0, 32);
      chatTitle.textContent = conv.title;
      renderHistoryList();
    }

    appendMessageEl(text, 'user');
    conv.messages.push({ role: 'user', content: text });
    textInput.value = '';
    updateCharCount();
    const loadingEl = appendMessageEl('Thinking…', 'bot', null, false);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          history: conv.messages.slice(0, -1), // history before this turn
          useSearch: searchOn
        })
      });
      const data = await res.json();
      const reply = data.reply || (data.error ? `${data.error}${data.detail ? ': ' + data.detail : ''}` : 'No response');
      loadingEl.textContent = reply;
      if (data.sources && data.sources.length) {
        const srcDiv = document.createElement('div');
        srcDiv.className = 'sources';
        data.sources.forEach(s => {
          const a = document.createElement('a');
          a.href = s.url; a.target = '_blank'; a.textContent = (s.title || 'source').slice(0, 28);
          srcDiv.appendChild(a);
        });
        loadingEl.appendChild(srcDiv);
      }
      conv.messages.push({ role: 'assistant', content: reply });
      conv.rendered.push({ text: reply, who: 'bot', sources: data.sources || null });
    } catch (e) {
      loadingEl.textContent = 'Error: ' + e.message;
    }

    } finally {
      isBusy = false;
      sendBtn.disabled = false;
      sendBtn.style.opacity = '1';
    }
  }

  sendBtn.addEventListener('click', send);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') send();
  });

  createConversation();
</script>

</body>
</html>
