<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vekosiq AI</title>
<style>
  :root {
    --bg: #fafaf8;
    --panel: #ffffff;
    --border: #e5e9e3;
    --green: #6fae8c;
    --green-soft: #e7f3ec;
    --green-dark: #4f8f6d;
    --text: #2b2f2c;
    --text-soft: #8a948c;
    --radius: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ---------- Sidebar ---------- */
  #sidebar {
    width: 240px;
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
  }
  #sidebar-header {
    padding: 18px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green);
  }
  #sidebar-header h1 {
    font-size: 15px;
    margin: 0;
    font-weight: 600;
    letter-spacing: 0.2px;
  }
  #newChatBtn {
    margin: 14px;
    padding: 10px 12px;
    border: 1px solid var(--green);
    background: var(--green-soft);
    color: var(--green-dark);
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
  }
  #newChatBtn:hover { background: var(--green); color: white; }
  #historyList {
    flex: 1;
    overflow-y: auto;
    padding: 0 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .hist-item {
    padding: 10px 12px;
    border-radius: 10px;
    font-size: 13px;
    color: var(--text-soft);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .hist-item:hover { background: var(--green-soft); color: var(--text); }
  .hist-item.active { background: var(--green-soft); color: var(--green-dark); font-weight: 600; }
  #sidebar-footer {
    padding: 12px 16px;
    font-size: 11px;
    color: var(--text-soft);
    border-top: 1px solid var(--border);
  }

  /* ---------- Main ---------- */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
  }
  header {
    padding: 16px 24px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header .title { font-size: 14px; font-weight: 600; color: var(--text-soft); }
  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-soft);
    cursor: pointer;
    user-select: none;
  }
  .switch {
    width: 36px; height: 20px;
    background: var(--border);
    border-radius: 20px;
    position: relative;
    transition: background 0.2s;
  }
  .switch.on { background: var(--green); }
  .switch::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: white;
    border-radius: 50%;
    transition: left 0.2s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  .switch.on::after { left: 18px; }

  #chat {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 760px;
    margin: 0 auto;
    width: 100%;
  }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .row.bot { justify-content: flex-start; }
  .msg {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.5;
    white-space: pre-wrap;
    font-size: 14.5px;
  }
  .row.user .msg {
    background: var(--green);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .row.bot .msg {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .sources {
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--text-soft);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .sources a {
    color: var(--green-dark);
    text-decoration: none;
    background: var(--green-soft);
    padding: 3px 8px;
    border-radius: 8px;
  }
  .sources a:hover { text-decoration: underline; }

  #welcome {
    margin: auto;
    text-align: center;
    color: var(--text-soft);
  }
  #welcome .logo {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: var(--green-soft);
    color: var(--green-dark);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    font-size: 22px;
    font-weight: 700;
  }
  #welcome h2 { color: var(--text); font-size: 18px; margin: 0 0 6px; }
  #welcome p { font-size: 13.5px; margin: 0; }

  footer {
    padding: 18px 24px 24px;
    background: var(--bg);
  }
  #inputBar {
    max-width: 760px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 8px 8px 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    box-shadow: 0 2px 10px rgba(80, 110, 90, 0.06);
  }
  #inputBar:focus-within { border-color: var(--green); }
  input[type=text] {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 14.5px;
    color: var(--text);
    padding: 8px 0;
  }
  input[type=text]::placeholder { color: var(--text-soft); }
  button#sendBtn {
    width: 38px; height: 38px;
    border: none;
    border-radius: 12px;
    background: var(--green);
    color: white;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  button#sendBtn:hover { background: var(--green-dark); }
  label.upload {
    width: 38px; height: 38px;
    border-radius: 12px;
    background: var(--green-soft);
    color: var(--green-dark);
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  label.upload:hover { background: var(--green); color: white; }
  #imgPreviewWrap {
    max-width: 760px;
    margin: 0 auto 8px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  #imgPreview { height: 44px; border-radius: 8px; border: 1px solid var(--border); }
  #clearImg {
    font-size: 12px;
    color: var(--text-soft);
    cursor: pointer;
    background: var(--green-soft);
    padding: 4px 10px;
    border-radius: 8px;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }
</style>
</head>
<body>

<div id="sidebar">
  <div id="sidebar-header">
    <div class="dot"></div>
    <h1>Vekosiq AI</h1>
  </div>
  <button id="newChatBtn">+ New chat</button>
  <div id="historyList"></div>
  <div id="sidebar-footer">Qwen3:8b · Qwen2.5VL:3b</div>
</div>

<div id="main">
  <header>
    <div class="title" id="chatTitle">New chat</div>
    <div class="toggle" id="searchToggleWrap">
      <span>Web search</span>
      <div class="switch" id="searchSwitch"></div>
    </div>
  </header>

  <div id="chat">
    <div id="welcome">
      <div class="logo">V</div>
      <h2>Vekosiq AI</h2>
      <p>Ask a question, attach an image, or turn on web search.</p>
    </div>
  </div>

  <footer>
    <div id="imgPreviewWrap">
      <img id="imgPreview" />
      <span id="clearImg">Remove</span>
    </div>
    <div id="inputBar">
      <label class="upload">
        📎
        <input type="file" id="imageInput" accept="image/*" style="display:none" />
      </label>
      <input type="text" id="textInput" placeholder="Message Vekosiq AI..." />
      <button id="sendBtn">↑</button>
    </div>
  </footer>
</div>

<script>
  const chatEl = document.getElementById('chat');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const imageInput = document.getElementById('imageInput');
  const imgPreview = document.getElementById('imgPreview');
  const imgPreviewWrap = document.getElementById('imgPreviewWrap');
  const clearImg = document.getElementById('clearImg');
  const searchSwitch = document.getElementById('searchSwitch');
  const searchToggleWrap = document.getElementById('searchToggleWrap');
  const newChatBtn = document.getElementById('newChatBtn');
  const historyListEl = document.getElementById('historyList');
  const chatTitle = document.getElementById('chatTitle');

  let pendingImage = null;
  let searchOn = false;

  // ---------- Conversation store (in-memory, resets on page reload) ----------
  // conversations: { id: { title, messages: [{role, content}], rendered: [{text, who, sources}] } }
  let conversations = {};
  let activeId = null;

  function newId() { return 'c_' + Date.now() + '_' + Math.random().toString(36).slice(2, 7); }

  function createConversation() {
    const id = newId();
    conversations[id] = { title: 'New chat', messages: [], rendered: [] };
    activeId = id;
    renderHistoryList();
    renderActiveChat();
  }

  function renderHistoryList() {
    historyListEl.innerHTML = '';
    Object.entries(conversations)
      .sort((a, b) => b[0].localeCompare(a[0]))
      .forEach(([id, conv]) => {
        const div = document.createElement('div');
        div.className = 'hist-item' + (id === activeId ? ' active' : '');
        div.textContent = conv.title;
        div.onclick = () => { activeId = id; renderHistoryList(); renderActiveChat(); };
        historyListEl.appendChild(div);
      });
  }

  function renderActiveChat() {
    const conv = conversations[activeId];
    chatTitle.textContent = conv.title;
    chatEl.innerHTML = '';
    if (conv.rendered.length === 0) {
      chatEl.innerHTML = `
        <div id="welcome">
          <div class="logo">V</div>
          <h2>Vekosiq AI</h2>
          <p>Ask a question, attach an image, or turn on web search.</p>
        </div>`;
      return;
    }
    conv.rendered.forEach(item => appendMessageEl(item.text, item.who, item.sources, false));
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function appendMessageEl(text, who, sources, save = true) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const row = document.createElement('div');
    row.className = 'row ' + who;
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = text;
    row.appendChild(msg);

    if (sources && sources.length) {
      const srcDiv = document.createElement('div');
      srcDiv.className = 'sources';
      sources.forEach(s => {
        const a = document.createElement('a');
        a.href = s.url; a.target = '_blank'; a.textContent = s.title?.slice(0, 28) || 'source';
        srcDiv.appendChild(a);
      });
      msg.appendChild(srcDiv);
    }

    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;

    if (save) {
      conversations[activeId].rendered.push({ text, who, sources });
    }
    return msg;
  }

  imageInput.addEventListener('change', () => {
    const file = imageInput.files[0];
    if (!file) return;
    pendingImage = file;
    imgPreview.src = URL.createObjectURL(file);
    imgPreviewWrap.style.display = 'flex';
  });
  clearImg.addEventListener('click', () => {
    pendingImage = null;
    imageInput.value = '';
    imgPreviewWrap.style.display = 'none';
  });

  searchToggleWrap.addEventListener('click', () => {
    searchOn = !searchOn;
    searchSwitch.classList.toggle('on', searchOn);
  });

  newChatBtn.addEventListener('click', createConversation);

  async function send() {
    const text = textInput.value.trim();
    if (!text && !pendingImage) return;
    if (!activeId) createConversation();
    const conv = conversations[activeId];

    if (conv.title === 'New chat' && text) {
      conv.title = text.slice(0, 32);
      chatTitle.textContent = conv.title;
      renderHistoryList();
    }

    if (pendingImage) {
      appendMessageEl(text || '(image uploaded)', 'user');
      const fd = new FormData();
      fd.append('image', pendingImage);
      fd.append('prompt', text || 'Describe this image in detail.');
      textInput.value = '';
      const loadingEl = appendMessageEl('Analyzing image…', 'bot', null, false);
      pendingImage = null;
      imageInput.value = '';
      imgPreviewWrap.style.display = 'none';
      try {
        const res = await fetch('/api/vision', { method: 'POST', body: fd });
        const data = await res.json();
        const reply = data.reply || (data.error ? `${data.error}${data.detail ? ': ' + data.detail : ''}` : 'No response');
        loadingEl.textContent = reply;
        conv.rendered.push({ text: reply, who: 'bot', sources: null });
      } catch (e) {
        loadingEl.textContent = 'Error: ' + e.message;
      }
      return;
    }

    appendMessageEl(text, 'user');
    conv.messages.push({ role: 'user', content: text });
    textInput.value = '';
    const loadingEl = appendMessageEl('Thinking…', 'bot', null, false);

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          history: conv.messages.slice(0, -1), // history before this turn
          useSearch: searchOn
        })
      });
      const data = await res.json();
      const reply = data.reply || (data.error ? `${data.error}${data.detail ? ': ' + data.detail : ''}` : 'No response');
      loadingEl.textContent = reply;
      if (data.sources && data.sources.length) {
        const srcDiv = document.createElement('div');
        srcDiv.className = 'sources';
        data.sources.forEach(s => {
          const a = document.createElement('a');
          a.href = s.url; a.target = '_blank'; a.textContent = (s.title || 'source').slice(0, 28);
          srcDiv.appendChild(a);
        });
        loadingEl.appendChild(srcDiv);
      }
      conv.messages.push({ role: 'assistant', content: reply });
      conv.rendered.push({ text: reply, who: 'bot', sources: data.sources || null });
    } catch (e) {
      loadingEl.textContent = 'Error: ' + e.message;
    }
  }

  sendBtn.addEventListener('click', send);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') send();
  });

  createConversation();
</script>

</body>
</html>
