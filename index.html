<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#fafaf8" />
<title>Vekosiq AI</title>
<style>
  :root {
    --bg: #fafaf8;
    --panel: #ffffff;
    --border: #e5e9e3;
    --green: #6fae8c;
    --green-soft: #e7f3ec;
    --green-dark: #4f8f6d;
    --text: #2b2f2c;
    --text-soft: #8a948c;
    --radius: 14px;
    --sidebar-w: 240px;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    height: 100dvh; /* keeps layout correct when mobile browser chrome shows/hides */
    display: flex;
    overflow: hidden;
  }

  /* ---------- Sidebar ---------- */
  #sidebar {
    width: var(--sidebar-w);
    background: var(--panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    flex-shrink: 0;
    transition: transform 0.25s ease;
  }
  #sidebar-header {
    padding: 18px 16px;
    padding-top: max(18px, env(safe-area-inset-top));
    display: flex;
    align-items: center;
    gap: 8px;
    border-bottom: 1px solid var(--border);
  }
  #sidebar-header .dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--green);
    flex-shrink: 0;
  }
  #sidebar-header h1 {
    font-size: 15px;
    margin: 0;
    font-weight: 600;
    letter-spacing: 0.2px;
    flex: 1;
  }
  #closeSidebarBtn {
    display: none;
    border: none;
    background: transparent;
    color: var(--text-soft);
    font-size: 20px;
    line-height: 1;
    cursor: pointer;
    padding: 6px;
  }
  #newChatBtn {
    margin: 14px;
    padding: 12px;
    border: 1px solid var(--green);
    background: var(--green-soft);
    color: var(--green-dark);
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    text-align: left;
  }
  #newChatBtn:hover { background: var(--green); color: white; }
  #historyList {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 0 10px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .hist-item {
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    color: var(--text-soft);
    cursor: pointer;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 6px;
  }
  .hist-item span.label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hist-item:hover, .hist-item:active { background: var(--green-soft); color: var(--text); }
  .hist-item.active { background: var(--green-soft); color: var(--green-dark); font-weight: 600; }
  .hist-del {
    flex-shrink: 0;
    font-size: 13px;
    color: var(--text-soft);
    opacity: 0;
    padding: 2px 6px;
    border-radius: 6px;
  }
  .hist-item:hover .hist-del { opacity: 1; }
  .hist-del:hover { color: #c0594f; background: rgba(192,89,79,0.1); }
  #sidebar-footer {
    padding: 12px 16px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    font-size: 11px;
    color: var(--text-soft);
    border-top: 1px solid var(--border);
  }

  /* ---------- Sidebar overlay (mobile) ---------- */
  #sidebarOverlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.35);
    z-index: 20;
  }

  /* ---------- Main ---------- */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 0;
    height: 100%;
  }
  header {
    padding: 14px 16px;
    padding-top: max(14px, env(safe-area-inset-top));
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    flex-shrink: 0;
  }
  header .left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  #menuBtn {
    display: none;
    border: none;
    background: var(--green-soft);
    color: var(--green-dark);
    width: 36px; height: 36px;
    border-radius: 10px;
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
    align-items: center;
    justify-content: center;
  }
  header .title { font-size: 14px; font-weight: 600; color: var(--text-soft); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    color: var(--text-soft);
    cursor: pointer;
    user-select: none;
    flex-shrink: 0;
  }
  .toggle span.label { display: inline; }
  .switch {
    width: 36px; height: 20px;
    background: var(--border);
    border-radius: 20px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .switch.on { background: var(--green); }
  .switch::after {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 16px; height: 16px;
    background: white;
    border-radius: 50%;
    transition: left 0.2s;
    box-shadow: 0 1px 2px rgba(0,0,0,0.15);
  }
  .switch.on::after { left: 18px; }

  #chat {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    max-width: 760px;
    margin: 0 auto;
    width: 100%;
    overscroll-behavior: contain;
  }
  .row { display: flex; }
  .row.user { justify-content: flex-end; }
  .row.bot { justify-content: flex-start; }
  .msg {
    max-width: 86%;
    padding: 12px 16px;
    border-radius: var(--radius);
    line-height: 1.5;
    white-space: pre-wrap;
    word-break: break-word;
    font-size: 15px;
  }
  .row.user .msg {
    background: var(--green);
    color: white;
    border-bottom-right-radius: 4px;
  }
  .row.bot .msg {
    background: var(--panel);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 4px;
  }
  .sources {
    margin-top: 8px;
    font-size: 11.5px;
    color: var(--text-soft);
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .sources a {
    color: var(--green-dark);
    text-decoration: none;
    background: var(--green-soft);
    padding: 4px 9px;
    border-radius: 8px;
  }
  .sources a:hover { text-decoration: underline; }

  #welcome {
    margin: auto;
    text-align: center;
    color: var(--text-soft);
    padding: 0 16px;
  }
  #welcome .logo {
    width: 48px; height: 48px;
    border-radius: 14px;
    background: var(--green-soft);
    color: var(--green-dark);
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 14px;
    font-size: 22px;
    font-weight: 700;
  }
  #welcome h2 { color: var(--text); font-size: 18px; margin: 0 0 6px; }
  #welcome p { font-size: 13.5px; margin: 0; }

  footer {
    padding: 12px 16px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    background: var(--bg);
    flex-shrink: 0;
  }
  #inputBar {
    max-width: 760px;
    margin: 0 auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 6px 6px 6px 14px;
    display: flex;
    align-items: center;
    gap: 6px;
    box-shadow: 0 2px 10px rgba(80, 110, 90, 0.06);
  }
  #inputBar:focus-within { border-color: var(--green); }
  input[type=text] {
    flex: 1;
    border: none;
    outline: none;
    background: transparent;
    font-size: 16px; /* >=16px prevents iOS Safari auto-zoom on focus */
    color: var(--text);
    padding: 10px 0;
    min-width: 0;
  }
  input[type=text]::placeholder { color: var(--text-soft); }
  #charCount {
    font-size: 11px;
    color: var(--text-soft);
    flex-shrink: 0;
    padding-right: 2px;
    user-select: none;
    display: none; /* shown on wider screens only, see media query */
  }
  #charCount.limit { color: #c0594f; font-weight: 600; }
  button#sendBtn {
    width: 40px; height: 40px;
    border: none;
    border-radius: 12px;
    background: var(--green);
    color: white;
    font-size: 17px;
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
  }
  button#sendBtn:hover { background: var(--green-dark); }
  button#sendBtn:disabled { opacity: 0.5; }
  label.upload {
    width: 40px; height: 40px;
    border-radius: 12px;
    background: var(--green-soft);
    color: var(--green-dark);
    cursor: pointer;
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  label.upload:hover { background: var(--green); color: white; }
  #imgPreviewWrap {
    max-width: 760px;
    margin: 0 auto 8px;
    display: none;
    align-items: center;
    gap: 8px;
  }
  #imgPreview { height: 44px; border-radius: 8px; border: 1px solid var(--border); }
  #clearImg {
    font-size: 12px;
    color: var(--text-soft);
    cursor: pointer;
    background: var(--green-soft);
    padding: 6px 10px;
    border-radius: 8px;
  }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 8px; }

  /* ---------- Phone / narrow-viewport optimization ---------- */
  @media (min-width: 769px) {
    #charCount { display: block; }
  }
  @media (max-width: 768px) {
    #sidebar {
      position: fixed;
      top: 0; left: 0; bottom: 0;
      z-index: 30;
      transform: translateX(-100%);
      box-shadow: 2px 0 16px rgba(0,0,0,0.12);
    }
    #sidebar.open { transform: translateX(0); }
    #sidebarOverlay.open { display: block; }
    #closeSidebarBtn { display: inline-flex; align-items: center; justify-content: center; }
    #menuBtn { display: flex; }
    .toggle span.label { display: none; } /* keep header compact on phones */
    #chat { padding: 18px 12px; gap: 14px; }
    .msg { max-width: 90%; font-size: 14.5px; }
    footer { padding: 10px 10px; padding-bottom: max(14px, env(safe-area-inset-bottom)); }
    #welcome .logo { width: 42px; height: 42px; font-size: 19px; }
    #welcome h2 { font-size: 16.5px; }
  }
  @media (max-width: 380px) {
    header { padding: 12px; }
    .toggle span:not(.switch) { display: none; }
  }
</style>
</head>
<body>

<div id="sidebarOverlay"></div>

<div id="sidebar">
  <div id="sidebar-header">
    <div class="dot"></div>
    <h1>Vekosiq AI</h1>
    <button id="closeSidebarBtn" aria-label="Close menu">✕</button>
  </div>
  <button id="newChatBtn">+ New chat</button>
  <div id="historyList"></div>
  <div id="sidebar-footer">Qwen3:8b · Qwen2.5VL:3b</div>
</div>

<div id="main">
  <header>
    <div class="left">
      <button id="menuBtn" aria-label="Open menu">☰</button>
      <div class="title" id="chatTitle">New chat</div>
    </div>
    <div class="toggle" id="searchToggleWrap">
      <span class="label">Web search</span>
      <div class="switch" id="searchSwitch"></div>
    </div>
  </header>

  <div id="chat">
    <div id="welcome">
      <div class="logo">V</div>
      <h2>Vekosiq AI</h2>
      <p>Ask a question, attach an image, or turn on web search.</p>
    </div>
  </div>

  <footer>
    <div id="imgPreviewWrap">
      <img id="imgPreview" />
      <span id="clearImg">Remove</span>
    </div>
    <div id="inputBar">
      <label class="upload">
        📎
        <input type="file" id="imageInput" accept="image/*" style="display:none" />
      </label>
      <input type="text" id="textInput" placeholder="Message Vekosiq AI..." maxlength="1096" autocomplete="off" />
      <span id="charCount">0 / 1096</span>
      <button id="sendBtn">↑</button>
    </div>
  </footer>
</div>

<script>
  const chatEl = document.getElementById('chat');
  const textInput = document.getElementById('textInput');
  const sendBtn = document.getElementById('sendBtn');
  const charCount = document.getElementById('charCount');
  const imageInput = document.getElementById('imageInput');
  const imgPreview = document.getElementById('imgPreview');
  const imgPreviewWrap = document.getElementById('imgPreviewWrap');
  const clearImg = document.getElementById('clearImg');
  const searchSwitch = document.getElementById('searchSwitch');
  const searchToggleWrap = document.getElementById('searchToggleWrap');
  const newChatBtn = document.getElementById('newChatBtn');
  const historyListEl = document.getElementById('historyList');
  const chatTitle = document.getElementById('chatTitle');
  const sidebar = document.getElementById('sidebar');
  const sidebarOverlay = document.getElementById('sidebarOverlay');
  const menuBtn = document.getElementById('menuBtn');
  const closeSidebarBtn = document.getElementById('closeSidebarBtn');

  const MAX_LEN = 1096; // keep in sync with server's MAX_MESSAGE_LENGTH

  let pendingImage = null;
  let searchOn = false;
  let isBusy = false; // true while a request is in flight, blocks sending more
  let activeId = null;
  let historyCache = [];

  // ---------- Mobile sidebar drawer ----------
  function openSidebar() {
    sidebar.classList.add('open');
    sidebarOverlay.classList.add('open');
  }
  function closeSidebar() {
    sidebar.classList.remove('open');
    sidebarOverlay.classList.remove('open');
  }
  menuBtn.addEventListener('click', openSidebar);
  closeSidebarBtn.addEventListener('click', closeSidebar);
  sidebarOverlay.addEventListener('click', closeSidebar);

  // ---------- API helpers ----------
  async function apiGet(url) {
    const res = await fetch(url);
    return res.json();
  }
  async function apiPost(url, body) {
    const res = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body || {})
    });
    return res.json();
  }
  async function apiDelete(url) {
    const res = await fetch(url, { method: 'DELETE' });
    return res.json();
  }

  // ---------- Conversation list (persisted server-side in SQLite) ----------
  async function loadHistoryList() {
    const data = await apiGet('/api/conversations');
    historyCache = data.conversations || [];
    renderHistoryList();
  }

  function renderHistoryList() {
    historyListEl.innerHTML = '';
    historyCache.forEach(conv => {
      const div = document.createElement('div');
      div.className = 'hist-item' + (conv.id === activeId ? ' active' : '');

      const label = document.createElement('span');
      label.className = 'label';
      label.textContent = conv.title;
      div.appendChild(label);

      const del = document.createElement('span');
      del.className = 'hist-del';
      del.textContent = '✕';
      del.title = 'Delete chat';
      del.onclick = async (e) => {
        e.stopPropagation();
        await apiDelete(`/api/conversations/${conv.id}`);
        if (conv.id === activeId) {
          await createConversation();
        } else {
          await loadHistoryList();
        }
      };
      div.appendChild(del);

      div.onclick = () => { selectConversation(conv.id); closeSidebar(); };
      historyListEl.appendChild(div);
    });
  }

  async function createConversation() {
    const data = await apiPost('/api/conversations');
    activeId = data.id;
    await loadHistoryList();
    renderMessages([]);
    chatTitle.textContent = 'New chat';
  }

  async function selectConversation(id) {
    activeId = id;
    const data = await apiGet(`/api/conversations/${id}`);
    chatTitle.textContent = data.title || 'New chat';
    renderMessages(data.messages || []);
    renderHistoryList();
  }

  function renderMessages(messages) {
    chatEl.innerHTML = '';
    if (!messages.length) {
      chatEl.innerHTML = `
        <div id="welcome">
          <div class="logo">V</div>
          <h2>Vekosiq AI</h2>
          <p>Ask a question, attach an image, or turn on web search.</p>
        </div>`;
      return;
    }
    messages.forEach(m => {
      appendMessageEl(m.content, m.role === 'user' ? 'user' : 'bot', m.sources);
    });
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function appendMessageEl(text, who, sources) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const row = document.createElement('div');
    row.className = 'row ' + who;
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = text;
    row.appendChild(msg);

    if (sources && sources.length) {
      const srcDiv = document.createElement('div');
      srcDiv.className = 'sources';
      sources.forEach(s => {
        const a = document.createElement('a');
        a.href = s.url; a.target = '_blank'; a.rel = 'noopener'; a.textContent = (s.title || 'source').slice(0, 28);
        srcDiv.appendChild(a);
      });
      msg.appendChild(srcDiv);
    }

    chatEl.appendChild(row);
    chatEl.scrollTop = chatEl.scrollHeight;
    return msg;
  }

  function updateCharCount() {
    const len = textInput.value.length;
    charCount.textContent = `${len} / ${MAX_LEN}`;
    charCount.classList.toggle('limit', len >= MAX_LEN);
  }
  textInput.addEventListener('input', updateCharCount);
  updateCharCount();

  imageInput.addEventListener('change', () => {
    const file = imageInput.files[0];
    if (!file) return;
    pendingImage = file;
    imgPreview.src = URL.createObjectURL(file);
    imgPreviewWrap.style.display = 'flex';
  });
  clearImg.addEventListener('click', () => {
    pendingImage = null;
    imageInput.value = '';
    imgPreviewWrap.style.display = 'none';
  });

  searchToggleWrap.addEventListener('click', () => {
    searchOn = !searchOn;
    searchSwitch.classList.toggle('on', searchOn);
  });

  newChatBtn.addEventListener('click', () => { createConversation(); closeSidebar(); });

  async function send() {
    if (isBusy) return; // one request at a time — don't pile requests onto the server

    const text = textInput.value.trim();
    if (!text && !pendingImage) return;
    if (text.length > MAX_LEN) {
      appendMessageEl(`Message is too long (${text.length}/${MAX_LEN} characters). Please shorten it.`, 'bot', null);
      return;
    }
    if (!activeId) await createConversation();

    isBusy = true;
    sendBtn.disabled = true;

    try {

    if (pendingImage) {
      appendMessageEl(text || '(image uploaded)', 'user', null);
      const fd = new FormData();
      fd.append('image', pendingImage);
      fd.append('prompt', text || 'Describe this image in detail.');
      fd.append('conversationId', activeId);
      textInput.value = '';
      updateCharCount();
      const loadingEl = appendMessageEl('Analyzing image…', 'bot', null);
      pendingImage = null;
      imageInput.value = '';
      imgPreviewWrap.style.display = 'none';
      try {
        const res = await fetch('/api/vision', { method: 'POST', body: fd });
        const data = await res.json();
        const reply = data.reply || (data.error ? `${data.error}${data.detail ? ': ' + data.detail : ''}` : 'No response');
        loadingEl.textContent = reply;
        if (data.title) {
          chatTitle.textContent = data.title;
          await loadHistoryList();
        }
      } catch (e) {
        loadingEl.textContent = 'Error: ' + e.message;
      }
      return;
    }

    appendMessageEl(text, 'user', null);
    textInput.value = '';
    updateCharCount();
    const loadingEl = appendMessageEl('Thinking…', 'bot', null);

    try {
      const data = await apiPost('/api/chat', {
        message: text,
        conversationId: activeId,
        useSearch: searchOn
      });
      const reply = data.reply || (data.error ? `${data.error}${data.detail ? ': ' + data.detail : ''}` : 'No response');
      loadingEl.textContent = reply;
      if (data.sources && data.sources.length) {
        const srcDiv = document.createElement('div');
        srcDiv.className = 'sources';
        data.sources.forEach(s => {
          const a = document.createElement('a');
          a.href = s.url; a.target = '_blank'; a.rel = 'noopener'; a.textContent = (s.title || 'source').slice(0, 28);
          srcDiv.appendChild(a);
        });
        loadingEl.appendChild(srcDiv);
      }
      if (data.title) {
        chatTitle.textContent = data.title;
        await loadHistoryList();
      }
    } catch (e) {
      loadingEl.textContent = 'Error: ' + e.message;
    }

    } finally {
      isBusy = false;
      sendBtn.disabled = false;
    }
  }

  sendBtn.addEventListener('click', send);
  textInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') send();
  });

  (async function init() {
    await loadHistoryList();
    if (historyCache.length) {
      await selectConversation(historyCache[0].id);
    } else {
      await createConversation();
    }
  })();
</script>

</body>
</html>
